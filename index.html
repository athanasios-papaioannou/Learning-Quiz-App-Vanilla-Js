<!DOCTYPE html>
<html lang="el">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Learning Quiz | Vanilla JavaScript Quiz Application</title>
  <link rel="stylesheet" href="styles.css">
  <meta
    name="description"
    content="Learning Quiz is a Vanilla JavaScript quiz application inspired by Learning Management Systems. It features dynamic question rendering, JSON data loading, score tracking, progress indicators, answer validation, and responsive design."
  />

  <meta name="author" content="Athanasios Papaioannou" />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Theme -->
  <meta name="theme-color" content="#38a15f" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta
    property="og:url"
    content="https://learning-quiz.athanasiospapaioannou.gr/"
  />

  <meta
    property="og:title"
    content="Learning Quiz | Vanilla JavaScript Quiz Application"
  />

  <meta
    property="og:description"
    content="A Vanilla JavaScript quiz application inspired by Learning Management Systems, featuring dynamic question rendering, asynchronous JSON loading, score tracking, and responsive design."
  />

  <meta
    property="og:image"
    content="https://learning-quiz.athanasiospapaioannou.gr/og-cover.jpg"
  />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />

  <meta
    name="twitter:title"
    content="Learning Quiz | Vanilla JavaScript Quiz Application"
  />

  <meta
    name="twitter:description"
    content="A Vanilla JavaScript quiz application inspired by Learning Management Systems, featuring dynamic question rendering, asynchronous JSON loading, score tracking, and responsive design."
  />

  <meta
    name="twitter:image"
    content="https://learning-quiz.athanasiospapaioannou.gr/og-cover.jpg"
  />
</head>

<body>

  <div class="quiz-container">
    <img src="images/learning-quiz-logo.png" alt="Learning Quiz Logo" class="quiz-logo">

    <div class="question-box">
      <div id="progress-text">Ερώτηση # από #</div><br/>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <h2 id="question">Εδώ θα εμφανίζεται η ερώτηση</h2>
    </div>

    <div class="answers">
      <button class="answer-btn">Απάντηση 1</button>
      <button class="answer-btn">Απάντηση 2</button>
      <button class="answer-btn">Απάντηση 3</button>
      <button class="answer-btn">Απάντηση 4</button>
    </div>

    <div class="controls">
      <div class="prev-next">
        <button id="prev-btn">Προηγούμενη</button>
        <button id="next-btn">Επόμενη</button>
      </div>
      <div class="reset">
        <button id="reset-btn">Reset</button>
      </div>
    </div>
  </div>
  <footer class="footer">
    <p>Designed & Developed by <a href="https://www.athanasiospapaioannou.gr" target="_blank"><strong>Athanasios Papaioannou</strong></a></p>
    <span>Learning Quiz • Version 1.2.0</span>
  </footer>
<script defer src="script.js"></script> <!-- defer δηλαδή κατέβασε JS παράλληλα αλλά ΤΡΕΞΕ το αφού φορτώσει όλο το HTML-->
</body>
</html>
